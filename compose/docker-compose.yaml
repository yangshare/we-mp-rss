services:
  mysql:
    image: docker.1ms.run/mysql:8.3.0
    container_name: db-mp
    restart: always
    env_file:
      - ../.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: we-mp-rss-singbox
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SINGBOX_INBOUND_PORT: 7890
      SINGBOX_LOG_LEVEL: info
    entrypoint:
      - /bin/sh
      - /etc/sing-box/run-singbox.sh
    volumes:
      - ./singbox/run-singbox.sh:/etc/sing-box/run-singbox.sh:ro

  we-mp-rss:
    image: ghcr.io/rachelos/we-mp-rss:latest
    container_name: we-mp-rss
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB: mysql+pymysql://rss_user:pass123456@db-mp/we_mp_rss?charset=utf8mb4
      PROXY_HTTP_URL: http://singbox:7890
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    depends_on:
      - mysql
      - singbox

volumes:
  db_data:
